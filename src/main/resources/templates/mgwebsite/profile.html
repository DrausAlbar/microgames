<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
<!-- <link rel="icon" href="favicon.ico" type="image/x-icon"> -->

<head th:replace="~{fragments/fr_microgames :: head}"></head>

<body>
    <div class="perfil-container">
        <h1>Mi Perfil</h1>



        <a href="/home" class="btn">Volver al Inicio</a>



        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="btn btn-logout">Cerrar Sesión</button>
        </form>

    </div>


    <div class="perfil-info">
        <p><strong>Usuario:</strong> <span th:text="${profile.username}"></span></p>
        <p><strong>Email:</strong> <span th:text="${profile.email}"></span></p>
        <p><strong>Nombre:</strong> <span th:text="${profile.firstname}"></span></p>
        <p><strong>Apellido:</strong> <span th:text="${profile.lastname}"></span></p>
        <p><strong>Rol:</strong> <span th:text="${profile.rol}"></span></p>
    </div>


</body>

</html>
