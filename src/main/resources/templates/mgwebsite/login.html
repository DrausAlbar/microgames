<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/fr_microgames :: head}"></head>
<header th:replace="~{fragments/fr_microgames :: header}"></header>

<body>
<div class="sandbox">

        <div style="padding-top: 20vh;">
            <div class="center">
                <!-- Cuadro de inicio de sesión -->
                <div class="panelcenter" style="padding: 50px;">
                    <div class="right">
                        <div th:if="${param.error}" class="alert alert-danger">Usuario o contraseña incorrectos</div>
                        <div th:if="${param.logout}" class="alert alert-info">Sesión cerrada correctamente</div>
                        <div th:if="${param.registered}" class="alert alert-success">Registro exitoso. Inicia sesión.</div>
                         <div th:if="${param.locked}" class="alert alert-warning"> Cuenta bloqueada temporalmente.</div>

    
                        <!-- Formulario de inicio de sesión -->

                        <form th:action="@{/login}" method="post" id="formlog">
                            <div class="mb-3">
                                <label for="username">Usuario:</label>
                                <input type="text" id="username" name="username" minlength="4" maxlength="16"
                                    pattern="[A-Za-z0-9]+" required autofocus />

                            </div>
                            <div>
                                <label for="password">Contraseña:</label>
                                <input type="password" id="password" name="password" minlength="8" maxlength="64"
                                    required>
                            </div>
                            <div class="bar-bottom" style="padding-bottom: 20px;"></div>
                            <div class="panelcenter">

                                <a href="/register">
                                    <div class="boton"> ▫️Registrarse</div>
                                </a>

                                <div class="boton" onclick="document.getElementById('formlog').submit()">▫️Iniciar
                                    Sesión
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        </div>
</body>
<footer th:replace="~{fragments/fr_microgames ::footer}"></footer>

</html>
