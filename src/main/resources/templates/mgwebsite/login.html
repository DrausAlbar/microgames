<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/fr_microgames :: head}"></head>
<header th:replace="~{fragments/fr_microgames :: header}"></header>

<body>
    <div class="sandbox">
        <div class="center" style="padding: 3vh;">
            <div class="panelcenter" style="padding: 3vw;">
                <form th:action="@{/login}" method="post" id="formlog">
                    <h1 class="center">Iniciar Sesión</h1>
                    <div th:if="${param.error}" class="alert alert-danger">Usuario o contraseña incorrectos
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info">Sesión cerrada correctamente

                    </div>
                    <div th:if="${param.registered}" class="alert alert-success">Registro exitoso. Inicia sesión.
                    </div>
                    <div th:if="${param.locked}" class="alert alert-warning"> Cuenta bloqueada temporalmente.
                    </div>

                    <div style="padding-top: 20px; width: 30vw;">
                        <label for="username">Usuario o Email:</label>
                        <input class="form-control" type="text" id="username" name="username" minlength="4"
                            maxlength="16" required>
                    </div>

                    <div style="padding-top: 20px;">
                        <label for="password">Contraseña:</label>
                        <input class="form-control" type="password" id="password" name="password" minlength="8"
                            maxlength="64" required>
                    </div>

                    <div class="center" style="padding-top: 20px;">
                        <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                            Iniciar Sesión
                        </button>
                    </div>
                    <div class="center" style="padding-top: 20px;"> <a href="/register">¿No tienes una cuenta?
                            Crea una cuenta.</a>
                    </div>
                </form>

            </div>

        </div>
    </div>
</body>
<footer th:replace="~{fragments/fr_microgames ::footer}"></footer>

</html>
