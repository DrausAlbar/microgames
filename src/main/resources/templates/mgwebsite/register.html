<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/fr_microgames :: head}"></head>
<header th:replace="~{fragments/fr_microgames :: header}"></header>

<body>
    <div class="sandbox">
        <div class="center" style="padding: 3vh;">
            <div class="panelcenter" style="padding: 3vw;">
                <form th:action="@{/register}" method="post">
                    <h1 class="center">Crear Cuenta</h1>
                    <div style="padding-top: 20px; width: 30vw;">
                        <br>    
                        <span id="usernameStatus"></span>
                        <label for="username">Usuario:</label>
                        <input class="form-control" type="text" id="username" name="username" minlength="4"
                            maxlength="16" required>

                    </div>
                    <div style="padding-top: 20px;">
                        <br>
                        <span id="emailStatus"></span>
                        <label for="email">Correo electrónico:</label>
                        <input class="form-control" type="email" id="email" name="email" required>


                    </div>
                    <div style="padding-top: 20px;">
                        <br>
                        <label for="password">Contraseña:</label>
                        <input class="form-control" type="password" id="password" name="password" minlength="8"
                            maxlength="64" required>
                    </div>
                    <div style="padding-top: 20px; width: 30vw;">
                        <br>
                        <span id="passwordStatus"></span>
                        <label for="confirmPassword">Repetir contraseña:</label>
                        <input class="form-control" type="password" id="confirmPassword" name="confirmPassword"
                            minlength="8" maxlength="64" required>
                        <br>
                    </div>

                    <div class="center">

                        <button type="submit" class="btn btn-primary w-100" id="submitBtn" disabled>
                            Registrarse
                        </button>
                    </div>
                    <div class="center" style="padding-top: 20px; width: 30vw;"> <a href="/login">¿Ya tienes una cuenta? Inicia sesión</a></div>
                    <div th:if="${error}" class="error-message">
                        <span th:text="${error}"></span>
                    </div>

                </form>

            </div>
        </div>
    </div>


    <script>

        let usernameValid = false;
        let emailValid = false;
        let passwordValid = false;

        function updateSubmitButton() {

            document.getElementById("submitBtn").disabled =
                !(usernameValid && emailValid && passwordValid);
        }

        // --------------------
        // USERNAME
        // --------------------

        document.getElementById("username")
            .addEventListener("input", async function () {

                const username = this.value;

                usernameValid = false;

                if (!/^[A-Za-z0-9]{4,16}$/.test(username)) {

                    document.getElementById("usernameStatus")
                        .textContent = "✖ 4-16 caracteres alfanuméricos";

                    updateSubmitButton();
                    return;
                }

                const response =
                    await fetch(`/api/register/username?username=${username}`);

                const available = await response.json();

                usernameValid = available;

                document.getElementById("usernameStatus")
                    .textContent =
                    available
                        ? "✔ Disponible"
                        : "✖ En uso";

                updateSubmitButton();
            });

        // --------------------
        // EMAIL
        // --------------------

        document.getElementById("email")
            .addEventListener("input", async function () {

                const email = this.value;

                emailValid = false;

                if (email.length < 5) {

                    updateSubmitButton();
                    return;
                }

                const response =
                    await fetch(`/api/register/email?email=${email}`);

                const available = await response.json();

                emailValid = available;

                document.getElementById("emailStatus")
                    .textContent =
                    available
                        ? "✔ Disponible"
                        : "✖ Registrado";

                updateSubmitButton();
            });

        // --------------------
        // PASSWORD
        // --------------------

        function validatePasswords() {

            const password =
                document.getElementById("password").value;

            const confirmPassword =
                document.getElementById("confirmPassword").value;

            passwordValid = false;

            if (password.length < 8 || password.length > 64) {

                document.getElementById("passwordStatus")
                    .textContent =
                    "✖ Debe tener entre 8 y 64 caracteres";

                updateSubmitButton();
                return;
            }

            if (password !== confirmPassword) {

                document.getElementById("passwordStatus")
                    .textContent =
                    "✖ Las contraseñas no coinciden";

                updateSubmitButton();
                return;
            }

            passwordValid = true;

            document.getElementById("passwordStatus")
                .textContent =
                "✔ Contraseñas correctas";

            updateSubmitButton();
        }

        document.getElementById("password")
            .addEventListener("input", validatePasswords);

        document.getElementById("confirmPassword")
            .addEventListener("input", validatePasswords);

    </script>

</body>
<footer th:replace="~{fragments/fr_microgames ::footer}"></footer>
</html>
