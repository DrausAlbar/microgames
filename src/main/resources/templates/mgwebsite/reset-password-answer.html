<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/fr_microgames :: head}"></head>
<header th:replace="~{fragments/fr_microgames :: header}"></header>

<body>
    <div class="sandbox">
        <div class="center" style="padding: 3vh;">
            <div class="panelcenter" style="padding: 3vw;">
                <form th:action="@{/reset-password/confirm}" method="post" id="formreset">
                    <h1 class="center">Recuperar Contraseña</h1>

                    <div th:if="${error}" class="alert alert-danger">
                        <span th:text="${error}"></span>
                    </div>

                    <input type="hidden" name="username" th:value="${username}">

                    <div style="padding-top: 20px; width: 30vw;">
                        <label>Pregunta secreta:</label>
                        <p th:text="${secretQuestion}"></p>
                    </div>

                    <div style="padding-top: 20px; width: 30vw;">
                        <label for="secretAnswer">Tu respuesta:</label>
                        <input class="form-control" type="text" id="secretAnswer" name="secretAnswer"
                            maxlength="100" required>
                    </div>

                    <div style="padding-top: 20px;">
                        <br>
                        <span id="passwordStatus"></span>
                        <label for="newPassword">Nueva contraseña:</label>
                        <input class="form-control" type="password" id="newPassword" name="newPassword"
                            minlength="8" maxlength="64" required>
                    </div>

                    <div style="padding-top: 20px; width: 30vw;">
                        <label for="confirmPassword">Repetir nueva contraseña:</label>
                        <input class="form-control" type="password" id="confirmPassword" name="confirmPassword"
                            minlength="8" maxlength="64" required>
                    </div>

                    <div class="center" style="padding-top: 20px;">
                        <button type="submit" class="btn btn-primary w-100" id="submitBtn" disabled>
                            Cambiar Contraseña
                        </button>
                    </div>

                    <div class="center" style="padding-top: 20px;">
                        <a href="/login">Volver a Iniciar Sesión</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>

        let passwordValid = false;

        function updateSubmitButton() {

            document.getElementById("submitBtn").disabled = !passwordValid;
        }

        function validatePasswords() {

            const password =
                document.getElementById("newPassword").value;

            const confirmPassword =
                document.getElementById("confirmPassword").value;

            passwordValid = false;

            if (password.length < 8 || password.length > 64) {

                document.getElementById("passwordStatus")
                    .textContent =
                    "✖ Debe tener entre 8 y 64 caracteres";

                updateSubmitButton();
                return;
            }

            if (password !== confirmPassword) {

                document.getElementById("passwordStatus")
                    .textContent =
                    "✖ Las contraseñas no coinciden";

                updateSubmitButton();
                return;
            }

            passwordValid = true;

            document.getElementById("passwordStatus")
                .textContent =
                "✔ Contraseñas correctas";

            updateSubmitButton();
        }

        document.getElementById("newPassword")
            .addEventListener("input", validatePasswords);

        document.getElementById("confirmPassword")
            .addEventListener("input", validatePasswords);

    </script>

</body>
<footer th:replace="~{fragments/fr_microgames ::footer}"></footer>

</html>
